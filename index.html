<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/RPMWiki/" />
    <title>RPMWiki — Титульная страница</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #2563eb;
        --accent-2: #1d4ed8;
        --border: #e5e7eb;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #0d1f3c;
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        position: relative;
        overflow: hidden;
      }

      body::before,
      body::after,
      .clouds,
      .water,
      .shore {
        display: none;
      }

      .rpm-title {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 4rem;
        font-weight: 900;
        letter-spacing: 8px;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 6px 20px rgba(0, 0, 0, 0.3), 0 2px 8px rgba(0, 0, 0, 0.2);
        z-index: 50;
        pointer-events: none;
      }

      .card {
        width: min(100%, 760px);
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.18), 0 0 40px rgba(255, 255, 255, 0.2);
        padding: 48px;
        position: relative;
        z-index: 10;
        backdrop-filter: blur(18px);
        margin-top: 80px;
      }

      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.15), rgba(255,255,255,0));
        pointer-events: none;
      }

      .card::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, rgba(56,189,248,0.8), rgba(129,140,248,0.6), rgba(56,189,248,0.8));
        border-radius: 999px;
      }

      .eyebrow {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: #dbeafe;
        color: var(--accent-2);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
        background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        margin: 0 0 24px;
        color: #4b5563;
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4) !important;
      }

      .btn-primary {
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        color: white;
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.8);
        color: var(--text);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
      }

      .support-box {
        margin-top: 20px;
        padding: 14px 16px;
        background: rgba(248, 250, 252, 0.9);
        border: 1px solid #dbeafe;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .support-box a {
        color: #2563eb;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="clouds"></div>
    <div class="rpm-title">RPM</div>
    <div class="water"></div>
    <div class="shore"></div>
    <main class="card">
      <span class="eyebrow">RPMWiki</span>
      <h1>Добро пожаловать на RPMWiki</h1>
      <p>Мы стараемся сделать ваш опыт использования максимально комфортным</p>
      <div class="actions">
        <a class="btn btn-primary" href="next.html">Начать</a>
        <a class="btn btn-secondary" href="legal.html">АК / УК</a>
        <a class="btn btn-secondary" href="map.html">Открыть карту</a>
      </div>

      <div class="support-box">
        <span>Нужна помощь? Напишите в поддержку</span>
        <a href="https://t.me/AlexxGroupBot_bot" target="_blank" rel="noopener">Открыть чат</a>
      </div>
    </main>
  </body>
</html>
