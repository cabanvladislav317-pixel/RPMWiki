<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/RPMWiki/" />
    <title>RPMWiki — Титульная страница</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #2563eb;
        --accent-2: #1d4ed8;
        --border: #e5e7eb;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #eef4ff 0%, var(--bg) 100%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 760px);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        padding: 48px;
      }

      .eyebrow {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: #dbeafe;
        color: var(--accent-2);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--accent);
        color: white;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
      }

      .btn-secondary {
        background: #f3f4f6;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="eyebrow">RPMWiki</span>
      <h1>Добро пожаловать на RPMWiki</h1>
      <p>Мы стараемся сделать ваш опыт использования максимально комфортным</p>
      <div class="actions">
        <a class="btn btn-primary" href="next.html">Начать</a>
        <a class="btn btn-secondary" href="map.html">Открыть карту</a>
      </div>
    </main>
  </body>
</html>
