<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/RPMWiki/" />
    <title>RPMWiki — Титульная страница</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #2563eb;
        --accent-2: #1d4ed8;
        --border: #e5e7eb;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 25%, #87ceeb 50%, #4a90e2 100%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 40%;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(135, 206, 235, 0.1) 100%);
        pointer-events: none;
        z-index: 1;
      }

      body::after {
        content: '';
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 35%;
        background: linear-gradient(90deg, #5a6b4d 0%, #6b8d5f 15%, #4a5f3f 25%, #7a9a6f 35%, #5a7a4f 50%, #6a8a5f 65%, #4a6a3f 80%, #5a7a4f 100%);
        pointer-events: none;
        z-index: 2;
        clip-path: polygon(0 30%, 5% 25%, 8% 20%, 12% 18%, 15% 22%, 18% 15%, 22% 12%, 25% 18%, 28% 14%, 32% 10%, 35% 16%, 38% 12%, 42% 8%, 45% 14%, 48% 10%, 52% 6%, 55% 12%, 58% 8%, 62% 4%, 65% 10%, 68% 6%, 72% 2%, 75% 8%, 78% 4%, 82% 0%, 85% 6%, 88% 2%, 92% 0%, 95% 5%, 100% 0%, 100% 100%, 0 100%);
      }

      .rpm-title {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 4rem;
        font-weight: 900;
        letter-spacing: 8px;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 6px 20px rgba(0, 0, 0, 0.3), 0 2px 8px rgba(0, 0, 0, 0.2);
        z-index: 50;
        pointer-events: none;
      }

      .card {
        width: min(100%, 760px);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.15), 0 0 40px rgba(74, 144, 226, 0.1);
        padding: 48px;
        position: relative;
        z-index: 10;
        backdrop-filter: blur(10px);
        background: rgba(255, 255, 255, 0.95);
        margin-top: 80px;
      }

      .eyebrow {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: #dbeafe;
        color: var(--accent-2);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
        background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        margin: 0 0 24px;
        color: #4b5563;
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4) !important;
      }

      .btn-primary {
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        color: white;
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.8);
        color: var(--text);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="rpm-title">RPM</div>
    <main class="card">
      <span class="eyebrow">RPMWiki</span>
      <h1>Добро пожаловать на RPMWiki</h1>
      <p>Мы стараемся сделать ваш опыт использования максимально комфортным</p>
      <div class="actions">
        <a class="btn btn-primary" href="next.html">Начать</a>
        <a class="btn btn-secondary" href="map.html">Открыть карту</a>
      </div>
    </main>
  </body>
</html>
