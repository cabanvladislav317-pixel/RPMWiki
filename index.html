<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/RPMWiki/" />
    <title>RPMWiki — Титульная страница</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #2563eb;
        --accent-2: #1d4ed8;
        --border: #e5e7eb;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at 80% -10%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 25%),
          linear-gradient(180deg, #71c7f8 0%, #8cc3f5 15%, #96b8db 30%, #6293c9 55%, #294f84 80%, #0b1b3a 100%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        top: 8%;
        left: 10%;
        width: 300px;
        height: 120px;
        background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.9), rgba(255,255,255,0.05));
        border-radius: 50%;
        filter: blur(10px);
        opacity: 0.7;
        z-index: 1;
      }

      body::after {
        content: '';
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 35%;
        background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(22, 81, 176, 0.65) 45%, rgba(22, 81, 176, 0.95) 100%);
        z-index: 2;
      }

      .clouds {
        position: fixed;
        top: 6%;
        left: 5%;
        width: 100%;
        height: 160px;
        background:
          radial-gradient(circle at 20% 40%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 25%),
          radial-gradient(circle at 40% 50%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 30%),
          radial-gradient(circle at 65% 35%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 25%),
          radial-gradient(circle at 80% 50%, rgba(255,255,255,0.88) 0%, rgba(255,255,255,0) 22%);
        opacity: 0.95;
        pointer-events: none;
        z-index: 1;
      }

      .water {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 30%;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 15%),
          linear-gradient(180deg, rgba(148, 205, 255, 0.15) 0%, rgba(19, 74, 145, 0.8) 100%);
        z-index: 2;
      }

      .shore {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 12%;
        background: linear-gradient(90deg, #f5f0dc 0%, #f8f4dc 35%, #e0d2a6 55%, #d3c089 100%);
        clip-path: polygon(0 20%, 8% 12%, 15% 24%, 22% 18%, 30% 26%, 38% 12%, 48% 28%, 55% 14%, 64% 22%, 72% 10%, 80% 24%, 88% 16%, 100% 22%, 100% 100%, 0 100%);
        z-index: 3;
      }

      .shore::before {
        content: '';
        position: absolute;
        right: 12%;
        bottom: 12px;
        width: 90px;
        height: 22px;
        background: rgba(255,255,255,0.4);
        border-radius: 999px;
        filter: blur(3px);
      }

      .rpm-title {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 4rem;
        font-weight: 900;
        letter-spacing: 8px;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 6px 20px rgba(0, 0, 0, 0.3), 0 2px 8px rgba(0, 0, 0, 0.2);
        z-index: 50;
        pointer-events: none;
      }

      .card {
        width: min(100%, 760px);
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.18), 0 0 40px rgba(255, 255, 255, 0.2);
        padding: 48px;
        position: relative;
        z-index: 10;
        backdrop-filter: blur(18px);
        margin-top: 80px;
      }

      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.15), rgba(255,255,255,0));
        pointer-events: none;
      }

      .card::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, rgba(56,189,248,0.8), rgba(129,140,248,0.6), rgba(56,189,248,0.8));
        border-radius: 999px;
      }

      .eyebrow {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: #dbeafe;
        color: var(--accent-2);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
        background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        margin: 0 0 24px;
        color: #4b5563;
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4) !important;
      }

      .btn-primary {
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        color: white;
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.8);
        color: var(--text);
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
      }

      .support-box {
        margin-top: 20px;
        padding: 14px 16px;
        background: rgba(248, 250, 252, 0.9);
        border: 1px solid #dbeafe;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .support-box a {
        color: #2563eb;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="clouds"></div>
    <div class="rpm-title">RPM</div>
    <div class="water"></div>
    <div class="shore"></div>
    <main class="card">
      <span class="eyebrow">RPMWiki</span>
      <h1>Добро пожаловать на RPMWiki</h1>
      <p>Мы стараемся сделать ваш опыт использования максимально комфортным</p>
      <div class="actions">
        <a class="btn btn-primary" href="next.html">Начать</a>
        <a class="btn btn-secondary" href="legal.html">АК / УК</a>
        <a class="btn btn-secondary" href="map.html">Открыть карту</a>
      </div>

      <div class="support-box">
        <span>Нужна помощь? Напишите в поддержку</span>
        <a href="https://t.me/your_support_bot" target="_blank" rel="noopener">Открыть чат</a>
      </div>
    </main>
  </body>
</html>
